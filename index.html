<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxs Leads | Inteligência em Food Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --primary: #f5b800; /* Amarelo Praxs */
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-box: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        
        .container { max-width: 900px; margin: 40px auto; }
        
        /* Header */
        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; }
        header h1 span { color: var(--primary); }
        header p { color: var(--text-dim); margin-top: 10px; }

        /* Form Card */
        .card { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 12px; }
        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 12px; }
        .form-group label { font-weight: 600; font-size: 0.9rem; color: var(--text-dim); }
        .form-group label span { color: var(--primary); }

        /* Chips */
        .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .chip { 
            padding: 10px 20px; background: var(--bg); border: 1px solid var(--border); 
            border-radius: 50px; cursor: pointer; font-size: 14px; transition: 0.2s; 
        }
        .chip:hover { border-color: var(--primary); }
        .chip.selected { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; }

        /* Select Styling */
        select {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 14px; font-family: 'Sora', sans-serif; font-size: 14px;
            border-radius: 8px; outline: none; width: 100%; appearance: none;
            cursor: pointer;
        }

        /* Buttons */
        .btn { 
            background: var(--primary); color: #000; padding: 16px 30px; border: none; 
            border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; width: 100%;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Result Section */
        #results { margin-top: 50px; display: none; }
        .lead-card { 
            background: var(--surface); border-left: 4px solid var(--primary); 
            padding: 20px; margin-bottom: 20px; border-radius: 0 8px 8px 0;
            animation: slideIn 0.4s ease forwards;
        }
        .lead-card h3 { font-size: 1.2rem; margin-bottom: 5px; color: var(--primary); }
        .lead-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .pain-point { background: #2a1b00; padding: 12px; border-radius: 6px; margin: 10px 0; border: 1px solid #4d3800; }
        .strategy { border: 1px dashed var(--primary); padding: 12px; border-radius: 6px; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PRAXS<span> LEADS</span></h1>
        <p>Gerador de oportunidades estratégicas para arquitetura comercial.</p>
    </header>

    <div class="card" id="main-card">
        <div class="form-group">
            <label>1. Escolha a Região <span>*</span></label>
            <div class="chip-group" id="regioes-search">
                <div class="chip" data-reg="Sudeste" onclick="selectRegiao(this)">Sudeste</div>
                <div class="chip" data-reg="Sul" onclick="selectRegiao(this)">Sul</div>
                <div class="chip" data-reg="Nordeste" onclick="selectRegiao(this)">Nordeste</div>
                <div class="chip" data-reg="Centro-Oeste" onclick="selectRegiao(this)">Centro-Oeste</div>
            </div>
        </div>

        <div class="form-group" id="group-cidade" style="display:none;">
            <label>2. Selecione a Cidade <span>*</span></label>
            <select id="cidade-select" onchange="checkInputs()">
                <option value="">Selecione uma cidade...</option>
            </select>
        </div>
        
        <div class="form-group" id="group-segmento" style="display:none;">
            <label>3. Segmento Alvo <span>*</span></label>
            <div class="chip-group" id="segmento-search">
                <div class="chip" data-val="Café" onclick="selectSegmento(this)">Café</div>
                <div class="chip" data-val="Hamburgueria" onclick="selectSegmento(this)">Hamburgueria</div>
                <div class="chip" data-val="Restaurante À la Carte" onclick="selectSegmento(this)">Restaurante</div>
                <div class="chip" data-val="Buffet Self-Service" onclick="selectSegmento(this)">Buffet</div>
                <div class="chip" data-val="Dark Kitchen" onclick="selectSegmento(this)">Dark Kitchen</div>
            </div>
        </div>

        <button id="btn-gerar" class="btn" style="display:none;" onclick="gerarPlano()">Buscar oportunidades →</button>
    </div>

    <div id="results">
        <h2 style="margin-bottom: 25px;">Oportunidades Encontradas</h2>
        <div id="leads-container"></div>
    </div>
</div>

<script src="base.js"></script>

<script>
    // Mapeamento de Cidades por Região
    const MAPA_CIDADES = {
        "Sudeste": ["São Paulo", "Rio de Janeiro", "Belo Horizonte", "Vitória", "Campinas", "Niterói", "São José dos Campos", "Ribeirão Preto", "Uberlândia", "Juiz de Fora", "Santos", "Santo André", "São Bernardo do Campo"],
        "Sul": ["Curitiba", "Porto Alegre", "Florianópolis", "Balneário Camboriú", "Londrina", "Maringá", "Caxias do Sul", "Joinville"],
        "Nordeste": ["Recife", "Salvador", "Fortaleza"],
        "Centro-Oeste": ["Brasília", "Goiânia"]
    };

    let regiaoSelecionada = "";
    let segmentoSelecionado = "";

    function selectRegiao(el) {
        document.querySelectorAll('#regioes-search .chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        
        regiaoSelecionada = el.dataset.reg;
        const cidades = MAPA_CIDADES[regiaoSelecionada] || [];
        
        const select = document.getElementById('cidade-select');
        select.innerHTML = '<option value="">Selecione uma cidade...</option>';
        
        cidades.forEach(cid => {
            const opt = document.createElement('option');
            opt.value = cid;
            opt.textContent = cid;
            select.appendChild(opt);
        });
        
        document.getElementById('group-cidade').style.display = 'flex';
        document.getElementById('group-segmento').style.display = 'flex';
        checkInputs();
    }

    function selectSegmento(el) {
        document.querySelectorAll('#segmento-search .chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        segmentoSelecionado = el.dataset.val;
        checkInputs();
    }

    function checkInputs() {
        const cidade = document.getElementById('cidade-select').value;
        if (regiaoSelecionada && cidade && segmentoSelecionado) {
            document.getElementById('btn-gerar').style.display = 'block';
        }
    }

    function gerarPlano() {
        const cidade = document.getElementById('cidade-select').value;
        const container = document.getElementById('leads-container');
        container.innerHTML = "";
        
        // Acessa a base de dados do base.js
        const leads = PROSPECTS_BASE[segmentoSelecionado] || [];
        
        // Filtra por cidade ou sigla da região (Ex: RJ, SP)
        const filtrados = leads.filter(l => 
            l.abrangencia.includes(cidade) || 
            l.nome.toLowerCase().includes(cidade.toLowerCase())
        );

        if (filtrados.length === 0) {
            container.innerHTML = `<p style="color: var(--text-dim)">Nenhum lead específico para ${cidade} encontrado nesta versão da base. Tente outra cidade da região ${regiaoSelecionada}.</p>`;
        } else {
            filtrados.forEach(l => {
                container.innerHTML += `
                    <div class="lead-card">
                        <div class="lead-meta">${l.tipo} | ${l.abrangencia}</div>
                        <h3>${l.nome}</h3>
                        <p><strong>Sinal de Oportunidade:</strong> ${l.sinal}</p>
                        <div class="pain-point">
                            <strong>Dor do Cliente:</strong><br>
                            <small>${l.dor}</small>
                        </div>
                        <div class="strategy">
                            <strong>Abordagem Técnica (Praxs):</strong><br>
                            <small>${l.abordagem}</small>
                        </div>
                        <p style="margin-top:10px; font-size:13px">
                            🔗 <a href="https://instagram.com/${l.instagram.replace('@','')}" target="_blank" style="color:var(--primary)">${l.instagram}</a>
                        </p>
                    </div>
                `;
            });
        }

        document.getElementById('results').style.display = 'block';
        window.scrollTo({ top: document.getElementById('results').offsetTop - 50, behavior: 'smooth' });
    }
</script>

</body>
</html>
