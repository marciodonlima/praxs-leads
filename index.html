<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxs Leads | Inteligência em Food Service</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --primary: #f5b800;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --border: #262626;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        
        .container { max-width: 900px; margin: 40px auto; }
        
        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -1px; }
        header h1 span { color: var(--primary); }
        header p { color: var(--text-dim); margin-top: 10px; font-size: 1.1rem; }

        .intro-text { text-align: center; margin-bottom: 30px; color: var(--text-dim); font-size: 0.9rem; max-width: 600px; margin-inline: auto; }

        .card { background: var(--surface); border: 1px solid var(--border); padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 12px; animation: fadeIn 0.5s ease forwards; }
        .form-group label { font-weight: 600; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .chip { 
            padding: 12px 18px; background: var(--bg); border: 1px solid var(--border); 
            border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s; color: var(--text-dim);
        }
        .chip:hover { border-color: var(--primary); color: var(--text); }
        .chip.selected { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 700; }

        select {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 14px; font-family: 'Sora', sans-serif; font-size: 15px;
            border-radius: 8px; outline: none; width: 100%; cursor: pointer;
        }

        .btn { 
            background: var(--primary); color: #000; padding: 18px; border: none; 
            border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; width: 100%;
            transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { background: #fff; transform: translateY(-2px); }

        #results { margin-top: 50px; display: none; }
        .result-header { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }

        .lead-card { 
            background: var(--surface); border: 1px solid var(--border);
            padding: 25px; margin-bottom: 20px; border-radius: 12px;
            animation: slideIn 0.4s ease forwards;
        }
        .lead-card h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--primary); }
        .lead-meta { font-size: 11px; color: var(--text-dim); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
        .pain-point { background: #1a1a1a; padding: 15px; border-radius: 8px; margin: 15px 0; border-left: 3px solid #ff4444; font-size: 14px; }
        .strategy { background: #1e1e1e; padding: 15px; border-radius: 8px; border-left: 3px solid var(--primary); font-size: 14px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-15px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PRAXS<span> LEADS</span></h1>
        <p>Inteligência em Prospecção Arquitetônica</p>
    </header>

    <p class="intro-text">Selecione os filtros abaixo para mapear as dores técnicas dos maiores players de Food Service do Brasil e gerar abordagens de alto impacto.</p>

    <div class="card">
        <div class="form-group">
            <label>1. Região Geográfica</label>
            <div class="chip-group" id="regioes-search">
                <div class="chip" data-reg="Sudeste" onclick="selectRegiao(this)">Sudeste</div>
                <div class="chip" data-reg="Sul" onclick="selectRegiao(this)">Sul</div>
                <div class="chip" data-reg="Nordeste" onclick="selectRegiao(this)">Nordeste</div>
                <div class="chip" data-reg="Centro-Oeste" onclick="selectRegiao(this)">Centro-Oeste</div>
            </div>
        </div>

        <div class="form-group" id="group-cidade" style="display:none;">
            <label>2. Cidade Foco</label>
            <select id="cidade-select" onchange="checkInputs()">
                <option value="">Selecione uma cidade...</option>
            </select>
        </div>
        
        <div class="form-group" id="group-segmento" style="display:none;">
            <label>3. Segmento de Mercado</label>
            <div class="chip-group" id="segmento-search">
                <div class="chip" data-val="Café" onclick="selectSegmento(this)">Café</div>
                <div class="chip" data-val="Hamburgueria" onclick="selectSegmento(this)">Hamburgueria</div>
                <div class="chip" data-val="Restaurante À la Carte" onclick="selectSegmento(this)">Restaurante</div>
                <div class="chip" data-val="Buffet Self-Service" onclick="selectSegmento(this)">Buffet</div>
                <div class="chip" data-val="Dark Kitchen" onclick="selectSegmento(this)">Dark Kitchen</div>
            </div>
        </div>

        <button id="btn-gerar" class="btn" style="display:none;" onclick="gerarPlano()">Mapear Oportunidades →</button>
    </div>

    <div id="results">
        <div class="result-header">
            <h2 id="result-title">Oportunidades</h2>
            <span id="result-count" style="color: var(--primary); font-weight: bold;"></span>
        </div>
        <div id="leads-container"></div>
    </div>
</div>

<script src="base.js"></script>

<script>
    const MAPA_CIDADES = {
        "Sudeste": ["São Paulo", "Rio de Janeiro", "Belo Horizonte", "Vitória", "Campinas", "Niterói", "São José dos Campos", "Ribeirão Preto", "Uberlândia", "Juiz de Fora", "Santos", "Santo André", "São Bernardo do Campo"],
        "Sul": ["Curitiba", "Porto Alegre", "Florianópolis", "Balneário Camboriú", "Londrina", "Maringá", "Caxias do Sul", "Joinville"],
        "Nordeste": ["Recife", "Salvador", "Fortaleza"],
        "Centro-Oeste": ["Brasília", "Goiânia"]
    };

    // Mapeamento para o sistema entender as siglas na sua base.js
    const SIGLAS_ESTADO = {
        "São Paulo": "SP", "Rio de Janeiro": "RJ", "Belo Horizonte": "MG", "Vitória": "ES",
        "Campinas": "SP", "Niterói": "RJ", "Uberlândia": "MG", "Curitiba": "PR", 
        "Porto Alegre": "RS", "Florianópolis": "SC", "Juiz de Fora": "MG"
    };

    let regiaoSelecionada = "";
    let segmentoSelecionado = "";

    function selectRegiao(el) {
        document.querySelectorAll('#regioes-search .chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        regiaoSelecionada = el.dataset.reg;
        
        const select = document.getElementById('cidade-select');
        select.innerHTML = '<option value="">Selecione uma cidade...</option>';
        MAPA_CIDADES[regiaoSelecionada].forEach(c => {
            const o = document.createElement('option'); o.value = c; o.textContent = c; select.appendChild(o);
        });
        
        document.getElementById('group-cidade').style.display = 'flex';
        document.getElementById('group-segmento').style.display = 'flex';
        checkInputs();
    }

    function selectSegmento(el) {
        document.querySelectorAll('#segmento-search .chip').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        segmentoSelecionado = el.dataset.val;
        checkInputs();
    }

    function checkInputs() {
        const cidade = document.getElementById('cidade-select').value;
        document.getElementById('btn-gerar').style.display = (regiaoSelecionada && cidade && segmentoSelecionado) ? 'block' : 'none';
    }

    function gerarPlano() {
        const cidade = document.getElementById('cidade-select').value;
        const sigla = SIGLAS_ESTADO[cidade] || "";
        const container = document.getElementById('leads-container');
        container.innerHTML = "";
        
        const leads = PROSPECTS_BASE[segmentoSelecionado] || [];
        
        // BUSCA INTELIGENTE: Procura pela Cidade OU pela Sigla do Estado
        const filtrados = leads.filter(l => 
            l.abrangencia.toUpperCase().includes(cidade.toUpperCase()) || 
            l.abrangencia.toUpperCase().includes(sigla) ||
            l.nome.toLowerCase().includes(cidade.toLowerCase())
        );

        document.getElementById('result-count').textContent = filtrados.length + " encontrados";

        if (filtrados.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding: 40px; color: var(--text-dim); background: var(--surface); border-radius: 12px; border: 1px dashed var(--border);">
                    <p>Nenhuma oportunidade específica para <strong>${cidade}</strong> cadastrada nesta categoria ainda.</p>
                    <p style="font-size: 12px; margin-top: 10px;">Dica: Experimente buscar em outra cidade do <strong>${regiaoSelecionada}</strong> enquanto expandimos a base.</p>
                </div>`;
        } else {
            filtrados.forEach(l => {
                container.innerHTML += `
                    <div class="lead-card">
                        <div class="lead-meta">${l.tipo} | ${l.abrangencia}</div>
                        <h3>${l.nome}</h3>
                        <p style="font-size: 14px; margin-bottom: 10px;"><strong>Sinal:</strong> ${l.sinal}</p>
                        <div class="pain-point">
                            <strong style="color: #ff4444">DOR IDENTIFICADA:</strong><br>
                            ${l.dor}
                        </div>
                        <div class="strategy">
                            <strong style="color: var(--primary)">ABORDAGEM PRAXS:</strong><br>
                            ${l.abordagem}
                        </div>
                        <p style="margin-top:15px; font-size:13px">
                            📸 Instagram: <a href="https://instagram.com/${l.instagram.replace('@','')}" target="_blank" style="color:var(--primary); text-decoration:none">${l.instagram}</a>
                        </p>
                    </div>`;
            });
        }

        document.getElementById('results').style.display = 'block';
        window.scrollTo({ top: document.getElementById('results').offsetTop - 50, behavior: 'smooth' });
    }
</script>

</body>
</html>
