<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxs Leads — Prospecção Food Service</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f0c; --surface: #161812; --surface2: #1e2019;
    --border: #2e3028; --border2: #3d4035;
    --gold: #f5b800; --gold-dim: #a67d00; --gold-glow: rgba(245,184,0,0.10);
    --green: #4a7c59; --green-bright: #6aaa7d;
    --text: #e8e6de; --text-dim: #8a887e; --text-muted: #555550;
    --red: #a85d4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 300;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.6;
  }

  header { padding: 28px 40px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; position: relative; z-index: 10;}
  .praxs-word { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; color: #fff; letter-spacing: -0.02em; }
  .praxs-word .a-letter { color: var(--gold); }
  .praxs-divider { width: 1px; height: 20px; background: var(--border2); margin: 0 14px; }
  .header-text h1 { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .header-text p { font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 3px; font-family: 'DM Mono', monospace; }

  .status-dot { margin-left: 16px; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-bright); box-shadow: 0 0 8px var(--green-bright); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  .btn-profile { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; background: transparent; border: 1px solid var(--border2); border-radius: 4px; font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; cursor: pointer; transition: all .2s; position: relative; z-index: 10;}
  .btn-profile:hover { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); }

  .app { flex: 1; display: flex; min-height: 0; position: relative; z-index: 1; }

  /* SIDEBAR E FUNIL */
  .sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
  .sidebar-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-title { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .sidebar-count { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--gold-dim); background: var(--gold-glow); padding: 2px 8px; border-radius: 2px; }
  .funil-stages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 14px; }
  
  .stage-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; padding: 0 4px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .prospect-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; margin-bottom: 5px; transition: border-color .15s; }
  .prospect-card:hover { border-color: var(--border2); }
  .prospect-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .prospect-meta { font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; line-height: 1.4; }
  .prospect-notes { font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 5px; line-height: 1.5; font-style: italic; max-height: 60px; overflow: hidden; text-overflow: ellipsis; }
  
  .prospect-links { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .prospect-link { font-size: 9px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 2px; color: var(--text-muted); text-decoration: none; font-family: 'DM Mono', monospace; letter-spacing: .04em; transition: all .15s; display: inline-flex; align-items: center; gap: 4px; background: var(--surface); }
  .prospect-link:hover { border-color: var(--gold-dim); color: var(--gold); }
  .prospect-link.insta:hover { border-color: #E1306C; color: #E1306C; }
  .prospect-link.site:hover { border-color: #4a9eff; color: #4a9eff; }

  .prospect-actions { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; border-top: 1px dashed var(--border); padding-top: 8px; }
  .stage-btn { font-size: 9px; padding: 4px 8px; border: 1px solid var(--border2); border-radius: 2px; background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: .04em; transition: all .15s; }
  .stage-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .stage-btn.highlight { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); width: 100%; margin-bottom: 4px; font-size: 10px; padding: 6px; }
  .stage-btn.highlight:hover { background: rgba(245,184,0,0.2); }
  .stage-btn.del:hover { border-color: var(--red); color: #d47a66; }

  /* MAIN AREA */
  main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 36px 40px 100px; }
  #intro { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 48px 0 32px; gap: 20px; animation: fadeIn .5s ease; }
  #intro h2 { font-family: 'DM Serif Display', serif; font-size: 30px; font-weight: 400; line-height: 1.3; color: var(--text); max-width: 460px; }
  #intro h2 em { color: var(--gold); font-style: italic; }
  #intro p { color: var(--text-dim); font-size: 14px; line-height: 1.7; max-width: 400px; }

  .btn { padding: 14px 34px; background: var(--gold); color: #0e0f0c; font-weight: 500; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; border: none; cursor: pointer; border-radius: 2px; transition: all .2s; }
  .btn:hover { background: #ffc61a; }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text-dim); padding: 14px 24px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; border-radius: 2px; cursor: pointer; transition: all .2s;}
  .btn-ghost:hover { border-color: var(--gold-dim); color: var(--gold); }

  #form-section { display: none; flex-direction: column; gap: 22px; animation: fadeIn .4s ease; max-width: 500px; margin: 0 auto; width: 100%; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .form-group select { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 14px; font-family: 'Sora', sans-serif; font-size: 14px; border-radius: 4px; outline: none; transition: border-color .2s; cursor: pointer; appearance: none; }
  .form-group select:focus { border-color: var(--gold-dim); }
  .form-group select option { background: var(--surface2); color: var(--text); }
  
  .chip-group { display: flex; flex-wrap: wrap; gap: 7px; }
  .chip { padding: 8px 16px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; color: var(--text-dim); cursor: pointer; transition: all .15s; user-select: none; }
  .chip:hover { border-color: var(--border2); color: var(--text); }
  .chip.selected { border-color: var(--gold-dim); color: var(--gold); background: var(--gold-glow); }

  #chat-section { display: none; flex-direction: column; animation: fadeIn .4s ease; width: 100%; max-width: 800px; margin: 0 auto; }
  .messages { display: flex; flex-direction: column; gap: 24px; }
  .msg { display: flex; flex-direction: column; gap: 7px; animation: fadeIn .4s ease; }
  .msg-label { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; font-family: 'DM Mono', monospace; color: var(--text-muted); }
  .msg.agent .msg-label { color: var(--gold-dim); }
  .msg.user .msg-label { color: var(--green); }
  .msg-body { line-height: 1.75; color: var(--text-dim); font-size: 14px; }
  .msg.agent .msg-body { color: var(--text); }

  .base-section { margin-top: 10px; margin-bottom: 32px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 24px;}
  .base-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .base-title { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--gold-dim); font-family: 'DM Mono', monospace; font-weight: 500; }
  .base-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width: 900px){ .base-cards { grid-template-columns: 1fr; } }
  
  .base-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 16px; transition: border-color .15s; display: flex; flex-direction: column; }
  .base-card:hover { border-color: var(--border2); }
  .base-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 8px; }
  .base-card-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .base-card-tipo { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 4px; }
  .base-card-oportunidade { font-size: 13px; color: var(--text-dim); line-height: 1.6; margin-bottom: 12px; flex: 1; }
  
  .base-card-intel { padding: 12px; background: rgba(0,0,0,0.2); border-radius: 4px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px;}
  .intel-item { font-size: 12px; line-height: 1.5; color: var(--text-dim); }
